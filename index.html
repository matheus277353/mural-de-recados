<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mural de Recados — Deixe sua mensagem para o grupo! Projeto colaborativo com Supabase e GitHub." />
  <title>Mural de Recados 📌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-icon">📌</span>
        <span class="logo-text">Mural de Recados</span>
      </div>
      <button id="btn-abrir-modal" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Recado
      </button>
    </div>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <h1 class="hero-titulo">Deixe seu recado!</h1>
    <p class="hero-subtitulo">Um mural colaborativo onde todos podem compartilhar mensagens. ✨</p>
    <div id="hero-stats" class="hero-stats">
      <span class="stat"><strong id="total-recados">--</strong> recados publicados</span>
    </div>
  </section>

  <!-- ===== GRID DE CARDS ===== -->
  <main class="main-container">
    <div id="cards-grid" class="cards-grid">
      <!-- Cards são injetados pelo JavaScript -->
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Carregando recados...</p>
      </div>
    </div>
  </main>

  <!-- ===== MODAL: NOVO RECADO ===== -->
  <div id="modal-recado" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-titulo">✏️ Novo Recado</h2>
        <button id="btn-fechar-modal" class="btn-fechar" aria-label="Fechar modal">&times;</button>
      </div>

      <form id="form-recado" novalidate>
        <div class="form-grupo">
          <label for="input-autor">Seu nome</label>
          <input
            type="text"
            id="input-autor"
            name="autor"
            placeholder="Ex: Matheus, Felipe, Arthur..."
            maxlength="50"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-grupo">
          <label for="input-mensagem">Mensagem
            <span id="contador-chars" class="contador">0/300</span>
          </label>
          <textarea
            id="input-mensagem"
            name="mensagem"
            placeholder="Escreva seu recado aqui..."
            rows="4"
            maxlength="300"
            required
          ></textarea>
        </div>

        <div class="form-grupo">
          <label>Cor do recado</label>
          <div id="seletor-cores" class="seletor-cores"></div>
        </div>

        <div class="form-acoes">
          <button type="button" id="btn-cancelar" class="btn-secundario">Cancelar</button>
          <button type="submit" id="btn-enviar" class="btn-primary">Publicar Recado</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>Desenvolvido por <strong>Matheus</strong>, <strong>Felipe</strong> e <strong>Arthur</strong> · Powered by <a href="https://supabase.com" target="_blank" rel="noopener">Supabase</a></p>
  </footer>

  <!-- ===== TOAST CONTAINER ===== -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- ===== SCRIPTS ===== -->
  <!-- Matheus: Banco de Dados -->
  <script src="matheus/database/supabase.js"></script>

  <!-- Felipe: Componentes de UI -->
  <script src="felipe/components/toast.js"></script>
  <script src="felipe/components/card.js"></script>
  <script src="felipe/components/form.js"></script>

  <!-- App principal -->
  <script src="app.js"></script>
</body>
</html>
